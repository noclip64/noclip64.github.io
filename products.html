<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="styles-products.css">
        <title>PRODUCTS</title>
    </head>
    <body>
        <div class="main-prod">
            
            <div id="menu">
                <h2>Our Pastries</h2>
            </div>

            <div class="product-container">
                <div class="product-card">
                    <img src="images/choco-cupcake.jpg" alt="Chocolate Cupcake">
                    <h3>Chocolate Cupcake</h3>
                    <p>₱180/box 15PCS</p>
                    <button type="button">ORDER NOW</button>
                </div>

                <div class="product-card">
                    <img src="images/banancupcake.jpg" alt="Banana Cupcake">
                    <h3>Banana Cupcake</h3>
                    <p>₱165/box 15PCS</p>
                    <button type="button">ORDER NOW</button>
                </div>

                <div class="product-card">
                    <img src="images/macaroons.jpg" alt="macaroons">
                    <h3>Macaroons</h3>
                    <p>₱110/box 20PCS</p>
                    <button type="button">ORDER NOW</button>
                </div>

                <div class="product-card">
                    <img src="images/choco-moist.jpg" alt="Chocolate Moist">
                    <h3>Chocolate Moist</h3>
                    <p>₱120/tub</p>
                    <button type="button">ORDER NOW</button>
                </div>

                <div class="product-card">
                    <img src="images/buko-pie.jpg" alt="buko-pie">
                    <h3>Buko Pie</h3>
                    <p>₱100/box 9PCS</p>
                    <button type="button">ORDER NOW</button>
                </div>

                <div class="product-card">
                    <img src="images/bananaloaf.jpg" alt="Banana Cupcake">
                    <h3>Banana Loaf</h3>
                    <p>₱100/box</p>
                    <button type="button">ORDER NOW</button>
                </div>
            </div>
            
        </div>
    </body>
</html>
